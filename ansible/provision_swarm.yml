---
# ================================================================
# Ansible Playbook: Provision Docker Swarm for Smart LPG App
# Usage: ansible-playbook ansible/provision_swarm.yml -i ansible/inventory.ini
# ================================================================
- name: Provision Docker Swarm Environment
  hosts: swarm_manager
  become: true

  vars:
    dockerhub_username: "{{ lookup('env', 'DOCKERHUB_USERNAME') }}"
    mongo_uri: "{{ lookup('env', 'MONGO_URI') }}"
    stack_name: "lpg-stack"
    image_name: "{{ dockerhub_username }}/lpg-app:latest"

  tasks:
    # ── Install Docker ─────────────────────────────────────────────────────
    - name: 1. Install prerequisites
      apt:
        name: [apt-transport-https, ca-certificates, curl, gnupg]
        state: present
        update_cache: true

    - name: 2. Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: 3. Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: 4. Install Docker Engine
      apt:
        name: docker-ce
        state: present
        update_cache: true

    - name: 5. Start and enable Docker
      service:
        name: docker
        state: started
        enabled: true

    # ── Initialise Docker Swarm ───────────────────────────────────────────
    - name: 6. Initialize Docker Swarm
      command: docker swarm init
      register: swarm_init
      failed_when:
        - swarm_init.rc != 0
        - "'already part of a swarm' not in swarm_init.stderr"
      changed_when: "'already part of a swarm' not in swarm_init.stderr"

    # ── Deploy Stack ──────────────────────────────────────────────────────
    - name: 7. Copy docker-stack.yml to server
      copy:
        src: ../docker-stack.yml
        dest: ~/docker-stack.yml
        mode: '0644'

    - name: 8. Pull latest image from Docker Hub
      command: docker pull {{ image_name }}

    - name: 9. Deploy the LPG stack
      command: >
        docker stack deploy
        --compose-file ~/docker-stack.yml
        --with-registry-auth
        {{ stack_name }}
      environment:
        DOCKERHUB_USERNAME: "{{ dockerhub_username }}"
        MONGO_URI: "{{ mongo_uri }}"

    # ── Verify ────────────────────────────────────────────────────────────
    - name: 10. Show running services
      command: docker service ls
      register: services
      changed_when: false

    - name: Print running services
      debug:
        msg: "{{ services.stdout_lines }}"
