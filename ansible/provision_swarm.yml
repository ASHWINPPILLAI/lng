---
# ============================================================
# Ansible Playbook: Provision Docker Swarm Environment
# Automates: Docker install → Swarm init → Stack deploy
# Run with: ansible-playbook ansible/provision_swarm.yml -i inventory.ini
# ============================================================
- name: Provision Docker Swarm for Smart LPG App
  hosts: swarm_manager
  become: true
  vars:
    dockerhub_username: "{{ lookup('env', 'DOCKERHUB_USERNAME') }}"
    image_name: "{{ dockerhub_username }}/lpg-app"
    stack_name: "lpg-stack"
    app_port: 3000

  tasks:
    # ── Install Docker ────────────────────────────────────────────────────
    - name: 1. Install required packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present
        update_cache: true

    - name: 2. Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: 3. Add Docker repository
      apt_repository:
        repo: deb [arch=amd64] https://download.docker.com/linux/ubuntu focal stable
        state: present

    - name: 4. Install Docker Engine
      apt:
        name: docker-ce
        state: present
        update_cache: true

    - name: 5. Start and enable Docker service
      service:
        name: docker
        state: started
        enabled: true

    # ── Initialise Docker Swarm ───────────────────────────────────────────
    - name: 6. Initialize Docker Swarm (if not already active)
      command: docker swarm init
      register: swarm_init
      failed_when:
        - swarm_init.rc != 0
        - "'already part of a swarm' not in swarm_init.stderr"
      changed_when: "'already part of a swarm' not in swarm_init.stderr"

    - name: Print Swarm status
      debug:
        msg: "{{ 'Swarm initialized' if swarm_init.changed else 'Swarm already active' }}"

    # ── Copy stack file and deploy ────────────────────────────────────────
    - name: 7. Copy Docker stack file to server
      copy:
        src: ../docker-stack.yml
        dest: ~/docker-stack.yml
        mode: '0644'

    - name: 8. Pull latest image from Docker Hub
      command: docker pull {{ image_name }}:latest

    - name: 9. Deploy the LPG stack to Swarm
      command: >
        docker stack deploy
        --compose-file ~/docker-stack.yml
        --with-registry-auth
        {{ stack_name }}
      environment:
        DOCKERHUB_USERNAME: "{{ dockerhub_username }}"
        MONGO_URI: "{{ lookup('env', 'MONGO_URI') }}"

    # ── Verify ────────────────────────────────────────────────────────────
    - name: 10. Check running services
      command: docker service ls
      register: services
      changed_when: false

    - name: Print service list
      debug:
        msg: "{{ services.stdout_lines }}"
