---
# ============================================================
# Ansible Playbook: Provision Docker-based LPG App Environment
# Automates: pull latest image from Docker Hub & run container
# Run with: ansible-playbook ansible/provision_docker.yml
# ============================================================
- name: Provision Smart LPG App with Docker
  hosts: localhost
  connection: local
  vars:
    image_name: "{{ lookup('env', 'DOCKERHUB_USERNAME') | default('your-dockerhub-username') }}/lpg-app"
    container_name: "lpg-management-system"
    app_port: 3000
    mongo_uri: "{{ lookup('env', 'MONGO_URI') }}"

  tasks:
    - name: 1. Check Docker is installed
      command: docker --version
      register: docker_version
      changed_when: false

    - name: Print Docker version
      debug:
        msg: "Docker version: {{ docker_version.stdout }}"

    - name: 2. Pull latest LPG app image from Docker Hub
      command: docker pull {{ image_name }}:latest
      register: pull_result
      changed_when: "'Status: Image is up to date' not in pull_result.stdout"

    - name: 3. Stop and remove old container (if running)
      command: docker rm -f {{ container_name }}
      ignore_errors: true
      changed_when: true

    - name: 4. Run new container with environment variables
      command: >
        docker run -d
        --name {{ container_name }}
        --restart unless-stopped
        -p {{ app_port }}:{{ app_port }}
        -e MONGO_URI="{{ mongo_uri }}"
        -e PORT="{{ app_port }}"
        -e NODE_ENV="production"
        {{ image_name }}:latest

    - name: 5. Verify container is running
      command: docker ps --filter "name={{ container_name }}" --format "table {{ '{{' }}.Names{{ '}}' }}\t{{ '{{' }}.Status{{ '}}' }}"
      register: ps_result
      changed_when: false

    - name: Print container status
      debug:
        msg: "{{ ps_result.stdout }}"
