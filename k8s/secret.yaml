# ============================================================
# Kubernetes Secret Template — DO NOT commit real values.
# In CI/CD (GitHub Actions), this secret is created dynamically
# via: kubectl create secret generic lpg-secrets \
#        --from-literal=mongo-uri='<MONGO_URI>'
#
# To apply manually for local/testing:
#   kubectl create secret generic lpg-secrets \
#     --from-literal=mongo-uri='<YOUR_MONGO_ATLAS_URI>'
# ============================================================
apiVersion: v1
kind: Secret
metadata:
  name: lpg-secrets
  labels:
    app: lpg-app
type: Opaque
# Values below are base64-encoded placeholders.
# In production, these are injected by the CI/CD pipeline from GitHub Secrets.
data:
  mongo-uri: <BASE64_ENCODED_MONGO_URI>
