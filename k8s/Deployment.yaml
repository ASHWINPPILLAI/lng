apiVersion: apps/v1
kind: Deployment
metadata:
  name: lpg-backend
  labels:
    app: lpg-app
    version: "1.0"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: lpg-app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: lpg-app
    spec:
      containers:
      - name: lpg-container
        image: us-central1-docker.pkg.dev/indigo-muse-471516-b8/lpg-docker-repo/lpg-app:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: MONGO_URI
          valueFrom:
            secretKeyRef:
              name: lpg-secrets
              key: mongo-uri
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: lpg-config
              key: PORT
        - name: NODE_ENV
          value: "production"
        resources:
          requests:
            memory: "128Mi"
            cpu: "250m"
          limits:
            memory: "256Mi"
            cpu: "500m"
        # Liveness probe: restart the container if it becomes unhealthy
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 20
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        # Readiness probe: only send traffic when the app is ready
        readinessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3