name: CI/CD Pipeline - Smart LPG System

on:
  push:
    branches:
      - master
  workflow_dispatch: # Allows manual triggering from GitHub Actions UI

env:
  DOCKER_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/lpg-app

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Check Environment Secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo "DOCKERHUB_USERNAME is missing"; exit 1; fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then echo "DOCKERHUB_TOKEN is missing"; exit 1; fi
          if [ -z "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" ]; then echo "RENDER_DEPLOY_HOOK_URL is missing"; exit 1; fi

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:latest
            ${{ env.DOCKER_IMAGE }}:${{ github.sha }}

      - name: Trigger Render Deployment
        if: success()
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" || (echo "Deployment trigger failed" && exit 1)
