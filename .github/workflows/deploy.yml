name: Build and Deploy - Smart LPG System

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: lpg-app

jobs:
  build-and-deploy:
    name: Build, Push to Docker Hub & Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── Step 1: Checkout code ──────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ── Step 2: Log in to Docker Hub ───────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 3: Build Docker image ─────────────────────────────────────
      - name: Build Docker Image
        run: |
          docker build \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      # ── Step 4: Push both tags to Docker Hub ───────────────────────────
      - name: Push Docker Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Step 5: Trigger Render.com auto-deploy via webhook ─────────────
      - name: Trigger Render Deploy
        run: |
          curl -s --fail "${{ secrets.RENDER_DEPLOY_HOOK_URL }}" \
            -o /dev/null && echo "Deploy triggered successfully" \
            || echo "Deploy hook not set — skipping"