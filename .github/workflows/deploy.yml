name: Build and Deploy - Smart LPG System

on:
  push:
    branches:
      - master

env:
  IMAGE_NAME: lpg-app
  STACK_NAME: lpg-stack

jobs:
  build-push-deploy:
    name: Build, Push to Docker Hub & Deploy via Swarm
    runs-on: ubuntu-latest
    environment: production

    steps:
      # ── Step 1: Checkout code ──────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v3

      # ── Step 2: Log in to Docker Hub ───────────────────────────────────
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # ── Step 3: Build Docker image ─────────────────────────────────────
      - name: Build Docker Image
        run: |
          docker build \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest \
            --tag ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            .

      # ── Step 4: Push both tags to Docker Hub ───────────────────────────
      - name: Push Image to Docker Hub
        run: |
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      # ── Step 5: SSH into Swarm manager and deploy the stack ────────────
      - name: Deploy Stack to Docker Swarm
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            # Pull the latest image on the Swarm manager
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

            # Export env vars for the stack file
            export DOCKERHUB_USERNAME=${{ secrets.DOCKERHUB_USERNAME }}
            export MONGO_URI='${{ secrets.MONGO_URI }}'

            # Deploy (or update) the stack — Swarm handles rolling update automatically
            docker stack deploy \
              --compose-file ~/docker-stack.yml \
              --with-registry-auth \
              ${{ env.STACK_NAME }}

      # ── Step 6: Verify the service is running ──────────────────────────
      - name: Verify Swarm Service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SWARM_HOST }}
          username: ${{ secrets.SWARM_USER }}
          key: ${{ secrets.SWARM_SSH_KEY }}
          script: |
            echo "=== Running Services ==="
            docker service ls
            echo "=== Service Tasks ==="
            docker service ps ${{ env.STACK_NAME }}_lpg-app --no-trunc