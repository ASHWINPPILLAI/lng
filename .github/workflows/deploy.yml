name: Build and Deploy to GKE

on:
  push:
    branches:
      - master

env:
  PROJECT_ID: indigo-muse-471516-b8
  GAR_LOCATION: us-central1
  GKE_CLUSTER: lpg-gke-cluster
  GKE_ZONE: us-central1-a
  REPOSITORY: lpg-docker-repo
  IMAGE: lpg-app

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: production

    steps:
    - name: Checkout
      uses: actions/checkout@v3

    - id: 'auth'
      uses: 'google-github-actions/auth@v1'
      with:
        credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v1

    - name: Docker Auth
      run: |-
        gcloud auth configure-docker $GAR_LOCATION-docker.pkg.dev

    - name: Build
      run: |-
        docker build \
          --tag "$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA" \
          --build-arg GITHUB_SHA="$GITHUB_SHA" \
          --build-arg GITHUB_REF="$GITHUB_REF" \
          .

    - name: Publish
      run: |-
        docker push "$GAR_LOCATION-docker.pkg.dev/$PROJECT_ID/$REPOSITORY/$IMAGE:$GITHUB_SHA"

    - name: Set up GKE credentials
      uses: google-github-actions/get-gke-credentials@v1
      with:
        cluster_name: ${{ env.GKE_CLUSTER }}
        location: ${{ env.GKE_ZONE }}

    - name: Create K8s Secret
      run: |-
        kubectl create secret generic lpg-secrets --from-literal=mongo-uri='${{ secrets.MONGO_URI }}' --dry-run=client -o yaml | kubectl apply -f -

    - name: Apply ConfigMap
      run: |-
        kubectl apply -f k8s/configmap.yaml

    - name: Deploy
      run: |-
        sed -i 's|us-central1-docker.pkg.dev/[^"]*|us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}|g' k8s/Deployment.yaml
        kubectl apply -f k8s/Deployment.yaml
        kubectl apply -f k8s/Service.yaml

    - name: Verify Rollout
      run: |-
        kubectl rollout status deployment/lpg-backend --timeout=120s