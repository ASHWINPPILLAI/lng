# ── Local Development ─────────────────────────────────────────────────────
version: '3.8'

services:
  lpg-app:
    build: .
    image: lpg-app:latest
    container_name: lpg-app-dev
    ports:
      - "3000:3000"
    environment:
      - MONGO_URI=${MONGO_URI}
      - PORT=3000
      - NODE_ENV=development
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
